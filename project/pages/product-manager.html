<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài học</title>
    <link rel="stylesheet" href="../css/product-manager.css">
    <link rel="stylesheet" href="../css/reset.css">
</head>

<body>
    <div class="main">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">
                <div class="icon">📚</div>
                <div class="text">
                    <h2>Study Tracker</h2>
                    <p>Quản lý tiến độ học tập</p>
                </div>
            </div>

                        <path fill-rule="evenodd" clip-rule="evenodd"

                        fill="none">
                        <path

                            fill="#84919A" />
                    </svg>Quản lý bài học</li>
            </ul>
        </div>


        <div class="content">
            <div class="nav-bar">
                <img src="../assets/icons/gridBtn.png" class="grid-btn">
                <div class="right">
                    <img src="../assets/icons/Bell.png">
                    <img src="../assets/icons/q-btn.png">
                    <img src="../assets/icons/seting-btn.png">
                    <img src="../assets/icons/avatar.png">
                </div>
            </div>

            <div class="container">
                <div class="top-bar">
                    <h2>Môn học</h2>

                    <div class="actions">
                        <select id="sortValue">
                            <option value="">Lọc theo trạng thái</option>
                            <option value="active">Đã hoàn thành</option>
                            <option value="unactive">Chưa hoàn thành</option>
                        </select>

                        <button>Thêm mới bài học</button>
                    </div>
                </div>


                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>
                                    <input type="checkbox">
                                </th>
                                <th>Tên bài học <button class="sort-btn"><svg xmlns="http://www.w3.org/2000/svg"
                                            width="11" height="11" viewBox="0 0 11 11" fill="none">
                                            <path
                                                d="M5.33329 0.666672V10M5.33329 10L9.99996 5.33334M5.33329 10L0.666626 5.33334"
                                                stroke="#667085" stroke-width="1.33333" stroke-linecap="round"
                                                stroke-linejoin="round" />
                                        </svg></button>
                                </th>
                                <th>Thời gian học <button class="sort-btn"><svg xmlns="http://www.w3.org/2000/svg"
                                            width="11" height="11" viewBox="0 0 11 11" fill="none">
                                            <path
                                                d="M5.33329 0.666672V10M5.33329 10L9.99996 5.33334M5.33329 10L0.666626 5.33334"
                                                stroke="#667085" stroke-width="1.33333" stroke-linecap="round"
                                                stroke-linejoin="round" />
                                        </svg></button></th>
                                <th>Trạng thái</th>
                                <th>Chức năng</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <input type="checkbox" checked>
                                </td>
                                <td>Session 1 - Tổng quan về HTML</td>
                                <td>45</td>
                                <td>
                                    <div class="status active-status">
                                        <span class="dot"></span>
                                        Đã hoàn thành
                                    </div>
                                </td>
                                <td class="actions-btn">
                                    <button class="edit-btn"><img src="../assets/icons/edit-2.png" alt=""></button>
                                    <button class="del-btn"><img src="../assets/icons/trash-2.png" alt=""></button>
                                </td>
                            </tr>

                            <tr>
                                <td>
                                    <input type="checkbox">
                                </td>
                                <td>Session 2 - Thẻ Inline và Block</td>
                                <td>60</td>
                                <td>
                                    <div class="status inactive-status">
                                        <span class="dot"></span>
                                        Chưa hoàn thành
                                    </div>
                                </td>
                                <td class="actions-btn">
                                    <button class="edit-btn"><img src="../assets/icons/edit-2.png" alt=""></button>
                                    <button class="del-btn"><img src="../assets/icons/trash-2.png" alt=""></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <button> <- </button>
                    <button>1</button>
                    <button class="active">2</button>
                    <button>3</button>
                    <button>-></button>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
